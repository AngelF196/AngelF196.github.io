<!-- Portfolio Grid Section -->
<section id="portfolio">
  <div class="container portfolio-flex-grid">
    <div class="row">
      <div class="col-lg-12 text-center">
        <h2>Portfolio</h2>
        <hr class="star-primary">
      </div>
    </div>
    <div class="portfolio-flex-row">
      {% for post in site.posts %}
      <div class="portfolio-flex-item portfolio-item col-sm-4">
        <a href="#portfolioModal-{{ post.modal-id }}" class="portfolio-link" data-toggle="modal">

          <!-- Hover overlay -->
          <div class="portfolio-hover">
            <div class="portfolio-hover-content">
              <i class="fa fa-search-plus fa-3x"></i>
            </div>
          </div>

          <!-- Wrapper for image & video -->
          <div class="media-preview">
            <!-- Default image -->
            <img src="img/portfolio/{{ post.img }}" class="img-responsive preview-image" alt="{{ post.alt | default: 'preview' }}">

            <!-- Hover video -->
            <video class="preview-video" muted loop playsinline>
              <source src="/videos/project{{ forloop.index }}-preview.mp4" type="video/mp4">
            </video>
          </div>

        </a>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
